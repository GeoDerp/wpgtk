# Security Workflow for Dependency Vulnerability Scanning
# This workflow runs multiple security checks on Python dependencies:
# 1. pip-audit: Official PyPA tool for scanning Python packages against OSV database
# 2. safety: Checks against Safety DB for known security vulnerabilities
# 3. bandit: Security linter for Python code (optional, checks for security issues in code)

name: Security - Dependency Vulnerability Scan

on:
  # Run on every push to main branches
  push:
    branches:
      - main
      - master
      - develop
  # Run on every pull request
  pull_request:
    branches:
      - main
      - master
      - develop
  # Allow manual trigger
  workflow_dispatch:
  # Run weekly on Monday at 9 AM UTC
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write  # Required for uploading SARIF results

jobs:
  dependency-scan:
    name: Scan Dependencies for Vulnerabilities
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install package dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Install security scanning tools
        run: |
          pip install pip-audit safety bandit

      - name: Run pip-audit (PyPA Official Tool)
        id: pip-audit
        continue-on-error: true
        run: |
          echo "## pip-audit Results" >> $GITHUB_STEP_SUMMARY
          pip-audit --desc --format json > pip-audit-report.json || true
          pip-audit --desc || true
          if [ -f pip-audit-report.json ]; then
            echo "pip-audit scan completed. Check the output above for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run Safety Check
        id: safety
        continue-on-error: true
        run: |
          echo "## Safety Check Results" >> $GITHUB_STEP_SUMMARY
          safety check --json > safety-report.json || true
          safety check --full-report || true
          echo "Safety check completed. Review output above for vulnerabilities." >> $GITHUB_STEP_SUMMARY

      - name: Run Bandit Security Linter
        id: bandit
        continue-on-error: true
        run: |
          echo "## Bandit Security Linter Results" >> $GITHUB_STEP_SUMMARY
          bandit -r wpgtk -f json -o bandit-report.json || true
          bandit -r wpgtk || true
          echo "Bandit scan completed. Check output for potential security issues in code." >> $GITHUB_STEP_SUMMARY

      - name: Upload pip-audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          if-no-files-found: ignore

      - name: Upload safety results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: safety-report.json
          if-no-files-found: ignore

      - name: Upload bandit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          if-no-files-found: ignore

      - name: Check for vulnerabilities
        run: |
          echo "Vulnerability scan complete!"
          echo "Review the step summaries above and artifact reports for detailed information."
          echo ""
          echo "If vulnerabilities are found:"
          echo "1. Review the severity and impact"
          echo "2. Update affected dependencies in pyproject.toml"
          echo "3. Test the updated dependencies"
          echo "4. Commit and push the updates"
          
          # Fail the workflow if critical vulnerabilities are found
          # Note: We use continue-on-error for individual scans to collect all results
          # but we want to indicate if any serious issues were found
          if [ -f pip-audit-report.json ]; then
            VULN_COUNT=$(jq '.dependencies | length' pip-audit-report.json 2>/dev/null || echo "0")
            if [ "$VULN_COUNT" != "0" ]; then
              echo "⚠️ pip-audit found $VULN_COUNT vulnerable dependencies"
            fi
          fi
